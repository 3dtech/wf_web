<div class="wt-kliinikum-header">
    <label>Vali oma alguskoht:</label>
    <div id="wf-kiosks">
        <button type="button" class="wt-btn wp-element-button" id="wf-kiosk-996" onclick="setKiosk(996, this)">N. Lunini</button>

    </div>

<script>
    var btns = document.getElementById("wf-kiosks");
    function getKiosk() {
        if (typeof wayfinder === "object") {
            kiosk = wayfinder.getKiosk();
            btns.querySelector("#wf-kiosk-" + kiosk).classList.add("wf-active");
        }
    }

    function setKiosk (id, target) {

        if (wayfinder) {
            wayfinder.setKiosk(id);
            wayfinder.map.update(true);
            if (target) {
                Object.values(btns.children).forEach(b => b.classList.remove("wf-active"));
                target.classList.add("wf-active");
            }
        }
    }

    setTimeout(getKiosk, 2500);
</script>
